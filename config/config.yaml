output:
  csv:
    file_path: '%APPDATA%\MetaQuotes\Terminal\Common\Files\TelegramSignals\signals.csv'
    encoding: utf-8
    append_mode: true
    fields:
    - message_id
    - channel_username
    - timestamp
    - symbol
    - direction
    - entry_price
    - entry_price_min
    - entry_price_max
    - stop_loss
    - take_profit_1
    - take_profit_2
    - take_profit_3
    - take_profit_4
    - confidence_score
    - raw_message
    - created_at
    - extracted_at
  error_log:
    file_path: logs/extraction_errors.jsonl
    max_bytes: 10485760
    backup_count: 5
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  date_format: '%Y-%m-%d %H:%M:%S'
  console:
    enabled: true
    level: INFO
  file:
